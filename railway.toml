# https://docs.railway.com/guides/config-as-code
#
# Tickets / MLB grades: outputs/ is not deployed. After grading locally, run
#   pwsh scripts/stage_graded_slate_for_deploy.ps1 -Date YYYY-MM-DD
#   py -3.14 scripts/build_ticket_eval.py --date YYYY-MM-DD
# and commit ui_runner/graded_slate/<date>/*.xlsx + ticket_eval_<date>.html (+ tickets_latest.json for /tickets).
#
# Nixpacks (default) + Dockerfile (optional): both use scripts/railway_gunicorn.sh → railway_serve.py → gunicorn.
# When graded_props_*.json exists under ui_runner/templates/, ingest runs in the background so /ping
# does not wait (long ingest previously caused Railway healthcheck 503s).
#
# If the live site never updates after git push:
#   - Railway → this service → Settings → Source: repo halekevi/PropORACLE, branch main
#   - Settings → Root Directory: leave EMPTY (repo root) for scripts/ + railway_gunicorn.sh.
#     If Root Directory is `ui_runner`, Nixpacks still often runs `gunicorn main:app` — use ui_runner/main.py shim.
#   - Settings → Custom Start Command: leave EMPTY so startCommand below is used, OR set explicitly:
#     sh scripts/railway_gunicorn.sh
#     If root is ui_runner only: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --worker-class gthread --timeout 180
#   - Settings → Watch Paths: leave empty (watch whole repo) or include ui_runner/**
#   - Deployments: confirm latest deploy shows the same commit as GitHub main (not Failed/Crashed)
#
# Verify live revision: View Source on home → <meta name="proporacle-build" ...> or curl -I /ping → X-PropOracle-Build
#
# Mobile (Capacitor): the Android app loads this same deployment via server.url — no new APK
# is required for template/CSS/Flask changes once this service redeploys from main.

[build]
builder = "NIXPACKS"

[deploy]
# workers=1: large slate JSON + gzip cache; two processes doubled RAM and OOM risk on small plans.
# Shared with Dockerfile via scripts/railway_gunicorn.sh (import self-test + gunicorn).
startCommand = "sh scripts/railway_gunicorn.sh"
healthcheckPath = "/ping"
healthcheckTimeout = 180

