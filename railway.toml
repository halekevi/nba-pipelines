# https://docs.railway.com/guides/config-as-code
#
# Docker builds were failing (large COPY / context); Nixpacks + explicit start matches your
# last successful "Daily slate" runtime (python 3.13) but runs the correct module: ui_runner.app:app
#
# If the live site never updates after git push:
#   - Railway → this service → Settings → Source: repo halekevi/PropORACLE, branch main
#   - Settings → Root Directory: leave EMPTY (repo root, not ui_runner/)
#   - Settings → Custom Start Command: leave EMPTY so startCommand below is used
#   - Settings → Watch Paths: leave empty (watch whole repo) or include ui_runner/**
#   - Deployments: confirm latest deploy shows the same commit as GitHub main (not Failed/Crashed)
#
# Verify live revision: View Source on home → <meta name="proporacle-build" ...> or curl -I /ping → X-PropOracle-Build

[build]
builder = "NIXPACKS"

[deploy]
# workers=1: large slate JSON + gzip cache; two processes doubled RAM and OOM risk on small plans.
# Shared with Dockerfile via scripts/railway_gunicorn.sh (import self-test + gunicorn).
startCommand = "sh scripts/railway_gunicorn.sh"
healthcheckPath = "/ping"
healthcheckTimeout = 180
