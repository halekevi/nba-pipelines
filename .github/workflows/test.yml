name: test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  proporacle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install pydantic pytest ruff typer numpy
      - name: Ruff
        run: ruff check proporacle tests
      - name: Pytest
        run: pytest
      - name: CLI smoke
        run: python -m proporacle.cli model smoke --sport nba --n 10
