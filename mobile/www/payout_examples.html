  <main class="wrap">
    <section class="card">
      <h1 class="title">Payout Ladder Examples</h1>
      <p class="muted">Generated at: <strong id="generatedAt">—</strong>. Use "Copy to Composer" then open <code>/payout</code> and paste into Ticket Composer.</p>
    </section>
    <section class="row" id="examplesGrid">
    </section>
  </main>
  <script id="embeddedPayload" type="application/json"></script>
  <script src="static/site-nav-chrome.js?v=20260412" defer></script>
  <script>
    const IS_BUNDLED_MOBILE =
      window.location.protocol === "file:" ||
      String(window.location.hostname || "").toLowerCase() === "localhost" ||
      String(window.location.hostname || "").toLowerCase() === "127.0.0.1";

    function _escapeHtml(s){
      return String(s == null ? "" : s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function renderExamples(payload){
      const data = (payload && typeof payload === "object") ? payload : {};
      const generatedAt = data.generated_at ? String(data.generated_at) : "—";
      document.getElementById("generatedAt").textContent = generatedAt;
      const grid = document.getElementById("examplesGrid");
      const examples = Array.isArray(data.examples) ? data.examples : [];
      if (!examples.length) {
        grid.innerHTML = '<article class="card"><div class="muted">No payout examples generated yet.</div></article>';
        return;
      }
      grid.innerHTML = examples.map((ex, idx) => {
        const legs = Array.isArray(ex.legs) ? ex.legs : [];
        const legsHtml = legs.map((leg) => (
          `<div class="leg">${_escapeHtml(leg.player)} · ${_escapeHtml(leg.prop_type)} · ${_escapeHtml(leg.pick_type)} · Δ ${_escapeHtml(leg.delta)} · ${_escapeHtml(leg.direction)}</div>`
        )).join("");
        const gob = (ex.goblin_delta === null || ex.goblin_delta === undefined) ? "—" : String(ex.goblin_delta);
        return `<article class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
            <strong>${_escapeHtml(ex.composition || "")}</strong>
            <button class="btn" type="button" data-ex-idx="${idx}">Copy to Composer</button>
          </div>
          <div class="muted" style="margin:6px 0 8px">Goblin delta: ${_escapeHtml(gob)}</div>
          ${legsHtml}
        </article>`;
      }).join("");
      for (const btn of grid.querySelectorAll("button[data-ex-idx]")) {
        btn.addEventListener("click", () => {
          const idx = Number(btn.getAttribute("data-ex-idx") || -1);
          if (idx < 0 || idx >= examples.length) return;
          copyComposer(examples[idx]);
        });
      }
    }

    async function loadExamples(){
      // In bundled/mobile output, template variables are not rendered; load local JSON bundle.
      if (IS_BUNDLED_MOBILE) {
        try {
          const r = await fetch("payout_ladder_examples.json", { cache: "no-store" });
          const j = await r.json();
          renderExamples(j);
          return;
        } catch (_e) {}
      }
      try {
        const el = document.getElementById("embeddedPayload");
        const raw = el ? String(el.textContent || "").trim() : "";
        renderExamples(raw ? JSON.parse(raw) : {});
      } catch (_e) {
        renderExamples({});
      }
    }

    function copyComposer(ex){
      const legs = (ex && Array.isArray(ex.legs)) ? ex.legs.map((l) => ({
        pick_type: l.pick_type || "Standard",
        delta: Number(l.delta || 0),
        direction: String(l.direction || "OVER").toUpperCase()
      })) : [];
      const payload = { legs: legs };
      const txt = JSON.stringify(payload);
      try { localStorage.setItem("payout_composer_prefill", txt); } catch(_e){}
      window.location.href = IS_BUNDLED_MOBILE ? "payout.html#composer" : "/payout#composer";
    }
    loadExamples();
  </script>
