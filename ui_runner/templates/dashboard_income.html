<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>PropORACLE — Income dashboard</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #111; color: #e8e8e8; }
    header { padding: 1rem 1.5rem; border-bottom: 1px solid #333; }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    header p { margin: 0.35rem 0 0; font-size: 0.85rem; color: #888; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 1rem; max-width: 1400px; margin: 0 auto; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    .panel { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 0.75rem; min-height: 320px; }
    .panel h2 { margin: 0 0 0.5rem; font-size: 0.95rem; color: #aaa; font-weight: 600; }
    .warn { background: #2a2210; border-color: #665500; padding: 1rem; margin: 1rem; border-radius: 8px; color: #cb8; }
    code { background: #222; padding: 0.1rem 0.35rem; border-radius: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>Income engine — ROI · CLV · calibration · drawdown</h1>
    <p>Not optimized for streaks or “correct legs.” See <code>DESIGN_PRINCIPLES.md</code>.</p>
  </header>

  {% if error %}
  <div class="warn">{{ error }}</div>
  {% endif %}

  <div class="grid">
    <div class="panel"><h2>Cumulative PnL (units)</h2><div id="roi"></div></div>
    <div class="panel"><h2>Mean CLV by EV bucket</h2><div id="clv"></div></div>
    <div class="panel"><h2>Calibration (pred vs hit rate)</h2><div id="cal"></div></div>
    <div class="panel"><h2>Drawdown (from peak equity)</h2><div id="dd"></div></div>
  </div>

  <script>
    const roi = {{ roi_json | safe }};
    const clv = {{ clv_json | safe }};
    const cal = {{ cal_json | safe }};
    const eq = {{ equity_json | safe }};

    if (roi.days && roi.days.length) {
      let cum = 0, c = [];
      for (let i = 0; i < roi.days.length; i++) {
        cum += roi.pnl[i];
        c.push(cum);
      }
      Plotly.newPlot('roi', [{ x: roi.days, y: c, type: 'scatter', line: { color: '#5dade2' } }], {
        margin: { t: 20, r: 20, b: 40, l: 50 },
        paper_bgcolor: '#1a1a1a', plot_bgcolor: '#111',
        font: { color: '#ccc' },
        xaxis: { title: 'Day' }, yaxis: { title: 'Cum PnL' }
      }, { displayModeBar: false });
    }

    if (clv.buckets && clv.buckets.length) {
      Plotly.newPlot('clv', [{ x: clv.buckets, y: clv.means, type: 'bar', marker: { color: '#58d68d' } }], {
        margin: { t: 20, r: 20, b: 80, l: 50 },
        paper_bgcolor: '#1a1a1a', plot_bgcolor: '#111',
        font: { color: '#ccc' },
        xaxis: { title: 'EV bucket' }, yaxis: { title: 'Mean CLV (implied Δ)' }
      }, { displayModeBar: false });
    }

    if (cal.pred && cal.pred.length) {
      Plotly.newPlot('cal', [
        { x: cal.pred, y: cal.hit, type: 'scatter', mode: 'markers', name: 'bins', marker: { size: 10, color: '#f4d03f' } },
        { x: [0, 1], y: [0, 1], type: 'scatter', mode: 'lines', name: 'perfect', line: { dash: 'dash', color: '#666' } }
      ], {
        margin: { t: 20, r: 20, b: 40, l: 50 },
        paper_bgcolor: '#1a1a1a', plot_bgcolor: '#111',
        font: { color: '#ccc' },
        xaxis: { title: 'Pred mean', range: [0, 1] }, yaxis: { title: 'Hit rate', range: [0, 1] }
      }, { displayModeBar: false });
    }

    if (eq.days && eq.days.length) {
      Plotly.newPlot('dd', [{ x: eq.days, y: eq.dd, type: 'scatter', fill: 'tozeroy', line: { color: '#e74c3c' } }], {
        margin: { t: 20, r: 20, b: 40, l: 50 },
        paper_bgcolor: '#1a1a1a', plot_bgcolor: '#111',
        font: { color: '#ccc' },
        xaxis: { title: 'Day' }, yaxis: { title: 'Drawdown', tickformat: ',.1%' }
      }, { displayModeBar: false });
    }
  </script>
</body>
</html>
