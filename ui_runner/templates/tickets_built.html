<script>
const ham2=document.getElementById('hamburger'), mob2=document.getElementById('mobile-menu');
if(ham2) ham2.addEventListener('click',()=>{ ham2.classList.toggle('open'); mob2.classList.toggle('open'); });
document.addEventListener('click',e=>{ if(ham2&&mob2&&!ham2.contains(e.target)&&!mob2.contains(e.target)){ham2.classList.remove('open');mob2.classList.remove('open');} });
</script>
<script>
(function(){
  const nav = document.querySelector('.snav');
  if (!nav) return;
  const mq = window.matchMedia('(max-width: 900px), (pointer: coarse)');
  let lastY = window.scrollY || 0;
  let ticking = false;
  const hideAfter = 140;
  const minDelta = 8;
  const update = () => {
    ticking = false;
    if (mq.matches) {
      nav.classList.remove('nav-hidden');
      lastY = window.scrollY || 0;
      return;
    }
    const y = window.scrollY || 0;
    const delta = y - lastY;
    if (y < hideAfter || delta < -minDelta) nav.classList.remove('nav-hidden');
    else if (delta > minDelta) nav.classList.add('nav-hidden');
    lastY = y;
  };
  window.addEventListener('scroll', () => {
    if (!ticking) {
      ticking = true;
      window.requestAnimationFrame(update);
    }
  }, { passive: true });
  window.addEventListener('resize', update);
  update();
})();
</script>
<script>
(function(){
  const saved = localStorage.getItem('proporacle-theme') || 'dark';
  applyTheme(saved);
})();
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('proporacle-theme', theme);
  const moon = document.getElementById('theme-toggle')?.querySelector('.tt-moon');
  const sun  = document.getElementById('theme-toggle')?.querySelector('.tt-sun');
  if (moon) moon.style.display = theme === 'dark' ? '' : 'none';
  if (sun)  sun.style.display  = theme === 'dark' ? 'none' : '';
}
function toggleTheme() {
  const curr = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(curr === 'dark' ? 'light' : 'dark');
}
</script>
<script>
(function(){
  const disableFx = window.matchMedia('(pointer: coarse), (prefers-reduced-motion: reduce)').matches;
  if (disableFx) return;
  const SELECTORS = [
    '.tickets-built .ticket', '.tickets-built .group', '.tickets-built .filter-pill', '.tickets-built .kpi', '.tickets-built .hero'
  ];
  function attachGlow(el) {
    if (el.dataset.glowBound === '1') return;
    el.dataset.glowBound = '1';
    el.classList.add('mouse-glow');
    el.addEventListener('mousemove', e => {
      const r = el.getBoundingClientRect();
      el.style.setProperty('--mouse-x', (e.clientX - r.left) + 'px');
      el.style.setProperty('--mouse-y', (e.clientY - r.top)  + 'px');
    });
  }
  function initGlow() {
    SELECTORS.forEach(sel =>
      document.querySelectorAll(sel).forEach(attachGlow)
    );
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initGlow);
  } else {
    initGlow();
  }
  let queued = false;
  const queueInit = () => {
    if (queued) return;
    queued = true;
    requestAnimationFrame(() => {
      queued = false;
      initGlow();
    });
  };
  const obs = new MutationObserver(queueInit);
  obs.observe(document.body, { childList: true, subtree: true });
})();
</script>
<script>

    });
  };
