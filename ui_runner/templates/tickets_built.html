<!DOCTYPE html>
<html lang="en" data-theme="dark" data-ui-build="{{ ui_build_id|default('', true) }}" data-deploy-sha="{{ deploy_git_sha|default('', true) }}">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
<script>(function(){try{var t=localStorage.getItem('proporacle-theme')||localStorage.getItem('theme');if(t==='light'){document.documentElement.setAttribute('data-theme','light');document.documentElement.classList.add('light-theme');}}catch(e){}})();</script>
<meta name="theme-color" content="#050505"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="proporacle-build" content="{{ ui_build_id|default('', true) }}"/>
<meta property="og:title" content="{{ page_title }}"/>
<title>{{ page_title }}</title>
<link rel="stylesheet" href="/static/proporacle-page-shell.css?v=20260418light"/>
<link rel="stylesheet" href="/static/site-nav-unified.css?v=20260408"/>
<link rel="stylesheet" href="/static/nav-mobile-shared.css?v=20260411"/>
<link rel="stylesheet" href="/static/mobile-content-width.css?v=20260416"/>
<link rel="stylesheet" href="/static/site-nav-datetime.css?v=20260408"/>
<link rel="stylesheet" href="/static/tickets-built-content.css?v=20260418width"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
</head>
<body>
<div class="orb-1" style="position:fixed;top:-12%;left:-6%;width:560px;height:560px;background:radial-gradient(circle,rgba(127,199,217,0.18) 0%,transparent 70%);filter:blur(120px);z-index:0;pointer-events:none;animation:orbP1 20s ease-in-out infinite alternate;"></div>
<div class="orb-1" style="position:fixed;top:30%;right:-8%;width:700px;height:700px;background:radial-gradient(circle,rgba(212,175,55,0.09) 0%,transparent 70%);filter:blur(120px);z-index:0;pointer-events:none;animation:orbP2 24s ease-in-out infinite alternate;"></div>
<div class="orb-2" style="position:fixed;bottom:8%;left:25%;width:580px;height:580px;background:radial-gradient(circle,rgba(183,168,255,0.07) 0%,transparent 70%);filter:blur(100px);z-index:0;pointer-events:none;animation:orbP3 28s ease-in-out infinite alternate;"></div>
<style>
@keyframes orbP1{from{transform:translate(0,0);}to{transform:translate(50px,70px);}}
@keyframes orbP2{from{transform:translate(0,0);}to{transform:translate(-40px,50px);}}
@keyframes orbP3{from{transform:translate(0,0);}to{transform:translate(35px,-40px);}}
</style>
<div class="mesh-bg" aria-hidden="true"></div>
<div class="grain-layer" aria-hidden="true"></div>
{% set nav_active = 'tickets' %}
{% include '_site_nav.html' %}
<div id="app" class="page-tickets">
{# Slips, empirical payout panel (sweep multiplier), and filter pills including TOP PAYOUT are rendered by scripts/combined_slate_tickets.render_tickets_body_html #}
{{ tickets_body|safe }}
</div>

<script src="/static/site-nav-chrome.js?v=20260412" defer></script>
<script>
(function(){
  const disableFx = window.matchMedia('(pointer: coarse), (prefers-reduced-motion: reduce)').matches;
  if (disableFx) return;
  const CA_SELS = [
    '.tickets-built .ticket', '.tickets-built .hero',
    '.tickets-built .filter-pill', '.tickets-built .kpi'
  ];
  function initCA() {
    CA_SELS.forEach(sel =>
      document.querySelectorAll(sel).forEach(el => {
        el.classList.add('ca-border');
      })
    );
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initCA);
  } else {
    initCA();
  }
  let queued = false;
  const queueInit = () => {
    if (queued) return;
    queued = true;
    requestAnimationFrame(() => {
      queued = false;
      initCA();
    });
  };
  const obs = new MutationObserver(queueInit);
  obs.observe(document.body, { childList: true, subtree: true });
})();
</script>
</body>
</html>
