<section class="hot-players-section" id="hot-players-section" style="display:none" aria-label="Hot players on today's slate">
  <div class="hot-players-header">
    <span class="hot-players-title">Hot <span>Players</span></span>
    <span class="hot-players-badge">TODAY</span>
    <span class="hot-players-updated" id="hot-players-updated"></span>
  </div>
  <div id="hot-track-wrap" class="hot-track-wrap" style="display:none" aria-label="Yesterday's Hot Players results">
    <div class="hot-track-header">
      <span class="hot-track-label" id="hot-track-label">Yesterday</span>
      <span class="hot-track-summary" id="hot-track-summary"></span>
    </div>
    <div class="hot-players-scroll hot-players-grid hot-track-grid" id="hot-track-scroll"></div>
  </div>
  <div id="hot-sport-filters" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px"></div>
  <div class="hot-players-scroll hot-players-grid" id="hot-players-scroll"></div>
  <div class="hot-players-empty" id="hot-players-empty" style="display:none">
    No players on today's slate yet — check back after the daily pipeline runs.
  </div>
</section>

<script>
(function () {
  const API = '/api/hot-players?limit=8&_v=2';
  const TRACK_API = '/api/hot-players/track-record';
  const SECTION = document.getElementById('hot-players-section');
  const SCROLL = document.getElementById('hot-players-scroll');
  const FILTERS = document.getElementById('hot-sport-filters');
  const EMPTY = document.getElementById('hot-players-empty');
  const UPDATED = document.getElementById('hot-players-updated');
  const TRACK_WRAP = document.getElementById('hot-track-wrap');
  const TRACK_SCROLL = document.getElementById('hot-track-scroll');
  const TRACK_LABEL = document.getElementById('hot-track-label');
  const TRACK_SUMMARY = document.getElementById('hot-track-summary');
  if (!SECTION || !SCROLL) return;

  let allCardsBySport = {};
  let activeSport = 'ALL';

  function dirClass(d) {
    return d === 'OVER' ? 'over' : d === 'UNDER' ? 'under' : 'both';
  }
  function fmtPct(v) {
    return v != null ? (v * 100).toFixed(1) + '%' : '—';
  }
  function tierDot(tier) {
    const colors = { high: 'var(--green,#9fd8a7)', medium: 'var(--amber,#c89a4a)', low: 'var(--muted2,#8b8b99)' };
    return '<span title="Confidence: ' + tier + '" style="display:inline-block;width:5px;height:5px;border-radius:50%;background:' + (colors[tier] || colors.low) + ';margin-right:3px;vertical-align:middle"></span>';
  }

  function resolveBestProp(p) {
    const dp = p.display_prop;
    if (dp && dp.prop_type) return dp;
    const bp = p.best_prop;
    if (bp && bp.prop_type) return bp;
    const list = p.best_props;
    if (Array.isArray(list) && list.length && list[0].prop_type) return list[0];
    return null;
  }

  function gradeBadge(result) {
    const r = String(result || '').toUpperCase();
    if (!r || r === 'PENDING' || r === 'NO_MATCH') return '';
    const cls = r === 'HIT' ? 'hit' : (r === 'MISS' ? 'miss' : 'void');
    return '<span class="card-grade-badge ' + cls + '">' + r + '</span>';
  }

  function bestPropBlock(p, opts) {
    opts = opts || {};
    const bp = resolveBestProp(p);
    if (!bp || !bp.prop_type) {
      const dir = (p.direction || 'BOTH').toString().toUpperCase();
      return '<div class="card-best-prop card-best-prop--empty">' +
        '<div class="card-prop-name card-prop-muted">Mixed props</div>' +
        '<div class="card-best-prop-row">' +
        '<span class="card-dir-badge ' + dirClass(dir) + '">' + (dir === 'BOTH' ? '—' : dir) + '</span>' +
        '</div></div>';
    }
    const dir = bp.direction || '';
    const tip = (bp.prop_type || '') + ' ' + dir + ' — ' + fmtPct(bp.hit_rate) + ' (' + (bp.total || 0) + ' props)';
    let lineMeta = '';
    if (opts.showLine && p.slate_line != null) {
      lineMeta = '<div class="card-slice-meta">Line ' + p.slate_line + (p.actual != null ? ' · actual ' + p.actual : '') + '</div>';
    } else {
      lineMeta = '<div class="card-slice-meta">' + (bp.hits || 0) + '/' + (bp.total || 0) + ' on this prop</div>';
    }
    return '<div class="card-best-prop" title="' + tip + '">' +
      '<div class="card-prop-name">' + (bp.prop_type || '') + '</div>' +
      '<div class="card-best-prop-row">' +
      '<span class="card-dir-badge ' + dirClass(dir) + '">' + dir + '</span>' +
      '<span class="card-slice-rate">' + fmtPct(bp.hit_rate) + '</span>' +
      '</div>' +
      lineMeta +
      '</div>';
  }

  function buildCard(p, opts) {
    opts = opts || {};
    const slate = p.on_today_slate ? '<span class="card-on-slate" title="On today\'s slate"></span>' : '';
    const bp = resolveBestProp(p);
    const rateLabel = bp && bp.prop_type
      ? tierDot(p.tier) + 'overall · ' + (p.total || 0) + ' props'
      : tierDot(p.tier) + 'hit rate · ' + (p.total || 0) + ' props';
    const tip = (p.player || '') + ' — ' + (p.sport || '') +
      (bp && bp.prop_type ? ' · best: ' + bp.prop_type + ' ' + (bp.direction || '') : '') +
      (p.result ? ' · ' + p.result : '');
    return '<div class="hot-player-card' + (opts.graded ? ' hot-player-card--graded' : '') + '" data-sport="' + (p.sport || '') + '" title="' + tip + '">' +
      slate +
      gradeBadge(p.result) +
      '<div class="card-sport">' + (p.sport || '') + '</div>' +
      '<div class="card-name">' + (p.player || '') + '</div>' +
      '<div class="card-rate">' + fmtPct(p.hit_rate) + '</div>' +
      '<div class="card-rate-label">' + rateLabel + '</div>' +
      bestPropBlock(p, opts) +
      '</div>';
  }

  function renderCards(sport) {
    SCROLL.innerHTML = '';
    const list = sport === 'ALL' ? Object.values(allCardsBySport).flat() : (allCardsBySport[sport] || []);
    if (!list.length) {
      EMPTY.style.display = '';
      SCROLL.style.display = 'none';
      return;
    }
    EMPTY.style.display = 'none';
    SCROLL.style.display = 'grid';
    SCROLL.innerHTML = list.map(function (p) { return buildCard(p); }).join('');
  }

  function buildFilters(sports) {
    const allSports = ['ALL'].concat(sports);
    FILTERS.innerHTML = allSports.map(function (s) {
      return '<button type="button" class="hot-sport-pill' + (s === activeSport ? ' active' : '') + '" data-s="' + s + '">' + s + '</button>';
    }).join('');
    FILTERS.querySelectorAll('button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        activeSport = btn.dataset.s;
        FILTERS.querySelectorAll('button').forEach(function (b) {
          b.classList.toggle('active', b.dataset.s === activeSport);
        });
        renderCards(activeSport);
      });
    });
  }

  function renderTrackRecord(data) {
    if (!TRACK_WRAP || !TRACK_SCROLL || !data || !Array.isArray(data.recent) || !data.recent.length) return;
    const day = data.recent[0];
    const results = (day.results || []).filter(function (r) {
      const res = String(r.result || '').toUpperCase();
      return res === 'HIT' || res === 'MISS' || res === 'VOID' || res === 'PUSH';
    });
    if (!results.length) return;

    const s = day.summary || {};
    const decided = (Number(s.hit) || 0) + (Number(s.miss) || 0);
    const hr = day.hit_rate != null ? fmtPct(day.hit_rate) : (decided ? fmtPct((Number(s.hit) || 0) / decided) : '—');

    if (TRACK_LABEL) TRACK_LABEL.textContent = 'Yesterday (' + (day.slate_date || '') + ')';
    if (TRACK_SUMMARY) {
      TRACK_SUMMARY.textContent = (s.hit || 0) + ' hit / ' + (s.miss || 0) + ' miss · ' + hr + ' on featured legs';
    }
    TRACK_SCROLL.innerHTML = results.map(function (p) {
      return buildCard(p, { graded: true, showLine: true });
    }).join('');
    TRACK_WRAP.style.display = '';
    SECTION.style.display = '';
  }

  function fetchTrackRecord() {
    const urls = [TRACK_API, 'hot_players_track_record.json'];
    (function tryNext(i) {
      if (i >= urls.length) return;
      fetch(urls[i], { cache: 'no-store' })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
        .then(renderTrackRecord)
        .catch(function () { tryNext(i + 1); });
    })(0);
  }

  function initHotPlayers() {
    fetchTrackRecord();
    fetch(API)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        allCardsBySport = data.sports || {};
        const sports = Object.keys(allCardsBySport).sort();
        if (!sports.length) {
          SECTION.style.display = '';
          if (!TRACK_WRAP || TRACK_WRAP.style.display !== '') {
            EMPTY.style.display = '';
          }
          return;
        }
        SECTION.style.display = '';
        if (data.date) UPDATED.textContent = data.date;
        buildFilters(sports);
        renderCards('ALL');
      })
      .catch(function (err) {
        console.warn('[HotPlayers]', err);
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initHotPlayers);
  } else {
    initHotPlayers();
  }
})();
</script>
